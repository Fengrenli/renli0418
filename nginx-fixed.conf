server { 
    listen 80; 
    server_name www.renliyesheng.net renliyesheng.net; 
    return 301 https://$host$request_uri;  
} 

server { 
    listen 443 ssl http2; 
    server_name www.renliyesheng.net renliyesheng.net; 
    
    ssl_certificate /www/server/panel/vhost/cert/www.renliyesheng.net/fullchain.pem; 
    ssl_certificate_key /www/server/panel/vhost/cert/www.renliyesheng.net/privkey.pem; 
    ssl_protocols TLSv1.2 TLSv1.3; 
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384; 
    ssl_prefer_server_ciphers on; 
    ssl_session_cache shared:SSL:10m; 
    ssl_session_timeout 10m; 
    
    root /www/wwwroot/renliyesheng; 
    index index.html index.htm;

    # 包含 MIME 类型配置
    include /www/server/nginx/conf/mime.types;

    # ============================================
    # 优先级 1: API 接口反向代理（最高优先级）
    # ============================================
    location /api { 
        proxy_pass http://127.0.0.1:3800; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-Forwarded-Proto $scheme; 
    } 
    
    # ============================================
    # 优先级 2: 上传文件和 3D 模型反向代理
    # ============================================
    location /uploads { 
        proxy_pass http://127.0.0.1:3800; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-Forwarded-Proto $scheme; 
    } 
    
    # ============================================
    # 优先级 3: 地球 TopoJSON 静态文件
    # ============================================
    location /world-atlas {
        alias /www/wwwroot/renliyesheng/public/world-atlas;
        add_header Content-Type "application/json; charset=utf-8" always;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    
    # ============================================
    # 优先级 4: 前端静态资源
    # ============================================
    location /assets {
        alias /www/wwwroot/renliyesheng/dist/assets;
        expires 1d; 
        add_header Cache-Control "public, no-transform";
        
        # 为 JavaScript 和 CSS 设置正确的 MIME 类型
        location ~* \.js$ {
            add_header Content-Type "application/javascript; charset=utf-8" always;
        }
        location ~* \.css$ {
            add_header Content-Type "text/css; charset=utf-8" always;
        }
    }
    
    # ============================================
    # 优先级 5: 其他静态资源（图片等）
    # ============================================
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ { 
        expires 7d; 
        add_header Cache-Control "public, immutable"; 
        try_files $uri =404; 
    }
    
    # ============================================
    # 优先级最低: 前端单页应用路由
    # ============================================
    location / { 
        try_files $uri $uri/ /index.html; 
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # 错误页配置 
    error_page 404 /404.html; 
    error_page 500 502 503 504 /50x.html; 
    
    location = /50x.html { 
        root /usr/share/nginx/html; 
    }
    
    access_log /www/wwwlogs/renliyesheng.net.log;
    error_log /www/wwwlogs/renliyesheng.net.error.log;
}
