server { 
    listen 80; 
    server_name www.renliyesheng.net renliyesheng.net; 
    return 301 https://$host$request_uri;  
} 

server { 
    listen 443 ssl http2; 
    server_name www.renliyesheng.net renliyesheng.net; 
    
    ssl_certificate /www/server/panel/vhost/cert/www.renliyesheng.net/fullchain.pem; 
    ssl_certificate_key /www/server/panel/vhost/cert/www.renliyesheng.net/privkey.pem; 
    ssl_protocols TLSv1.2 TLSv1.3; 
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384; 
    ssl_prefer_server_ciphers on; 
    ssl_session_cache shared:SSL:10m; 
    ssl_session_timeout 10m; 
    
    root /www/wwwroot/renliyesheng/dist; 
    index index.html index.htm;

    include /www/server/nginx/conf/mime.types;
    default_type text/html;

    # ============================================
    # 优先级 1: API 接口反向代理
    # ============================================
    location /api { 
        proxy_pass http://127.0.0.1:3800; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-Forwarded-Proto $scheme; 
    } 
    
    # ============================================
    # 优先级 2: 上传文件和 3D 模型反向代理
    # ============================================
    location /uploads { 
        proxy_pass http://127.0.0.1:3800; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-Forwarded-Proto $scheme; 
    } 
    
    # ============================================
    # 优先级 3: 其他静态资源
    # ============================================
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ { 
        expires 7d; 
        add_header Cache-Control "public, immutable"; 
        try_files $uri =404; 
    }
    
    # ============================================
    # 优先级最低: 前端单页应用路由
    # ============================================
    location / { 
        try_files $uri $uri/ /index.html; 
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # 错误页配置 
    error_page 404 /404.html; 
    error_page 500 502 503 504 /50x.html; 
    
    location = /50x.html { 
        root /usr/share/nginx/html; 
    }
    
    access_log /www/wwwlogs/renliyesheng.net.log;
    error_log /www/wwwlogs/renliyesheng.net.error.log;
}
