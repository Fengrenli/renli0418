server { 
     listen 80; 
     server_name www.renliyesheng.net renliyesheng.net; 
     return 301 https://$host$request_uri; 
 } 
 
 server { 
     listen 443 ssl ; 
     http2 on; 
     server_name www.renliyesheng.net renliyesheng.net; 
     
     ssl_certificate /www/server/panel/vhost/cert/www.renliyesheng.net/fullchain.pem; 
     ssl_certificate_key /www/server/panel/vhost/cert/www.renliyesheng.net/privkey.pem; 
     ssl_protocols TLSv1.2 TLSv1.3; 
     ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384; 
     ssl_prefer_server_ciphers on; 
     ssl_session_cache shared:SSL:10m; 
     ssl_session_timeout 10m; 
     
     root /www/wwwroot/renliyesheng; 
     index index.html index.htm; 

     # 3D模型文件和上传文件通过反向代理
     location /uploads {
         proxy_pass http://127.0.0.1:3800;
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Proto $scheme;
     }
     
     # 3D模型文件类型直接反向代理
     location ~* \.(glb|gltf)$ {
         proxy_pass http://127.0.0.1:3800;
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Proto $scheme;
     }
     
     # 前端静态资源缓存优化
     location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
         expires 1d;
         add_header Cache-Control "public, no-transform";
         try_files $uri =404;
     }
     
     # 前端单页应用路由兼容
     location / {
         try_files $uri $uri/ /index.html;
     }
     
     # 后端API接口反向代理
     location /api {
         proxy_pass http://127.0.0.1:3800;
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Proto $scheme;
     }
     
     # 错误页配置
     error_page 404 /404.html;
     error_page 500 502 503 504 /50x.html;
     
     location = /50x.html {
         root /usr/share/nginx/html;
     }
 }